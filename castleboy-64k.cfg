# CastleBoy 64KB cartridge config (cc65, C-friendly).
#
# CPU map: 8000-BFFF is the bank-switched window (SV_BANK bits 7-5 select the
# 16KB bank); C000-FFFF is FIXED to the last bank. So any code that switches the
# bank or reads banked data MUST live in C000-FFFF. We place:
#   - FIXEDCODE (blit + bank switch), runtime, vectors, DATA load -> ROMHI (fixed)
#   - the rest of CODE + non-banked RODATA               -> ROM0  (bank 0, 8000)
#   - pre-shifted PLAYER sprite data                     -> BANK1 (bank 1, 8000)
#
# The ROM image is laid out as: bank0(16K) + bank1(16K) + (bank2 16K spare) +
# fixed(16K). Banks 0/1/2 share the same CPU window 8000-BFFF; fixed is C000.

SYMBOLS {
    __STACKSIZE__: type = weak, value = $0100;
}
MEMORY {
    ZP:       file = "",  start = $0000, size = $0100;
    CPUSTACK: file = "",  start = $0100, size = $0100;
    RAM:      file = "",  start = $0200, size = $1E00 - __STACKSIZE__, define = yes;
    VRAM:     file = "",  start = $4000, size = $2000;

    BANK0:    file = %O,  start = $8000, size = $4000, fill = yes, fillval = $FF;
    BANK1:    file = %O,  start = $8000, size = $4000, fill = yes, fillval = $FF;
    BANK2:    file = %O,  start = $8000, size = $4000, fill = yes, fillval = $FF;
    ROMHI:    file = %O,  start = $C000, size = $4000, fill = yes, fillval = $FF, define = yes;
}
SEGMENTS {
    ZEROPAGE:  load = ZP,                type = zp,  define   = yes;

    # --- fixed bank (always mapped at C000-FFFF) ---
    FIXEDCODE: load = ROMHI,             type = ro,  define   = yes;
    LOWCODE:   load = ROMHI,             type = ro,  optional = yes;
    ONCE:      load = ROMHI,             type = ro,  optional = yes;
    RODATAHI:  load = ROMHI,             type = ro,  optional = yes;
    # non-banked RODATA (tiles, maps, font, UI, enemy/non-ps sprites) lives in the
    # fixed bank so bank0 code can read it whichever bank is mapped at 8000. Listed
    # here (before FFF0/VECTOR) so it fills the C000 region, not past the vectors.
    RODATA:    load = ROMHI,             type = ro,  define   = yes;
    DATA:      load = ROMHI, run = RAM,  type = rw,  define   = yes;
    FFF0:      load = ROMHI,             type = ro,  offset   = $3FF0;
    VECTOR:    load = ROMHI,             type = ro,  offset   = $3FFA;

    # --- bank 0 (default at 8000-BFFF): bulk code ---
    CODE:      load = BANK0,             type = ro,  define   = yes;

    # --- bank 1: pre-shifted player sprite data ---
    BANK1SEG:  load = BANK1,             type = ro,  optional = yes, define = yes;
    # --- bank 2: pre-shifted enemy sprite data ---
    BANK2SEG:  load = BANK2,             type = ro,  optional = yes, define = yes;

    BSS:       load = RAM,               type = bss, define   = yes;
}
FEATURES {
    CONDES: type    = constructor,
            label   = __CONSTRUCTOR_TABLE__,
            count   = __CONSTRUCTOR_COUNT__,
            segment = ONCE;
    CONDES: type    = destructor,
            label   = __DESTRUCTOR_TABLE__,
            count   = __DESTRUCTOR_COUNT__,
            segment = RODATAHI;
    CONDES: type    = interruptor,
            label   = __INTERRUPTOR_TABLE__,
            count   = __INTERRUPTOR_COUNT__,
            segment = RODATAHI,
            import  = __CALLIRQ__;
}
